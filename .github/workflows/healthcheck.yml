name: Health check — connections

# Verifies the live integrations (Telegram token, model key) actually work.
# Runs on a schedule and on demand; a broken connection fails the job, so GitHub
# emails you instead of you discovering it mid-demo. Caught the "regenerated the
# token but forgot to update the secret" class of bug for us.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Check connections
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m copilot.healthcheck
