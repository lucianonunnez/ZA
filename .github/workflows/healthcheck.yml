name: Health check — connections

# Verifies the live integrations (Telegram token, model key) actually work.
# On demand only: run it before a demo to confirm the connections. The scheduled
# trigger is intentionally off — Telegram's API is intermittently slow from CI
# runners, and a transient getMe ReadTimeout (not a real outage) was emailing
# false-alarm failures. Re-enable the cron once on a steadier host (webhook).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Check connections
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m copilot.healthcheck
