name: CI

# CI gates: lint, tests, and security scans must pass before code is trusted.
# "Evidence over vibes" enforced automatically on every push and PR.

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (incl. optional extras) + ruff
        run: pip install -e ".[dev,mcp]" ruff

      - name: Lint (ruff)
        run: ruff check src crm evals tests

      - name: Run tests
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit .
          # Report advisories without failing the demo on transitive ones.
          pip-audit || true

      - name: Secret scan (gitleaks CLI)
        run: |
          # Use the CLI directly: no license gate, no PR-API calls, fully under our control.
          VER=8.21.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # --no-git scans the working tree (current files), so inline
          # `# gitleaks:allow` markers on known-safe dev placeholders are honored.
          ./gitleaks detect --source . --no-git --no-banner --redact --verbose
