name: CI

# CI gates: lint, tests, and security scans must pass before code is trusted.
# "Evidence over vibes" enforced automatically on every push and PR.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (incl. optional extras) + ruff
        run: pip install -e ".[dev,mcp]" ruff

      - name: Lint (ruff)
        run: ruff check src crm evals tests

      - name: Run tests
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit .
          # Report advisories without failing the demo on transitive ones.
          pip-audit || true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
